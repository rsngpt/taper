name: CI

on:
  push:
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Runs all JVM unit tests, including the Robolectric queue tests and the
      # constrained-heap child-JVM tests (no emulator required).
      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Lint
        run: ./gradlew :taper:lintDebug :benchmark:lintDebug

      - name: Upload test and lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/tests/**
            **/build/reports/lint-results-*.html
          retention-days: 14

  # The instrumented memory benchmark is NOT run in CI: it needs an emulator and
  # its numbers are only meaningful on a device profile you control. Run it
  # locally with ./run_benchmark.sh (see README).
